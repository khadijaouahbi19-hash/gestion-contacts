<!-- liste-contacts.component.html -->
<div>
  <h2>📋 Liste des Contacts ({{ contacts.length }})</h2>

  <!-- Recherche (Exercice 5B) -->
  <input [(ngModel)]="recherche" placeholder="🔍 Rechercher un contact...">
  <p>{{ contactsFiltres.length }} résultat(s)</p>

  <!-- Statistiques (Exercice 4B) -->
  <p *ngIf="nombreAjouts > 0" class="stat">
    🆕 {{ nombreAjouts }} contact(s) ajouté(s) depuis le chargement
  </p>
  <small>Liste chargée à : {{ dateChargement }}</small>

  <!-- Message si liste vide -->
  <p *ngIf="contacts.length === 0" class="vide">Aucun contact pour le moment.</p>

  <!-- Liste des contacts filtrés -->
  <ul *ngIf="contacts.length > 0">
    <li *ngFor="let c of contactsFiltres; let i = index">
      <span class="num">{{ i + 1 }}.</span>
      <strong>{{ c.nom }}</strong>
      — {{ c.email }}
      <small *ngIf="c.telephone"> | {{ c.telephone }}</small>
      <button class="btn-del" (click)="supprimer(i)">❌</button>
    </li>
  </ul>
</div>
