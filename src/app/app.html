<!-- app.component.html -->
<header>
  <h1>🔍 Gestionnaire de Contacts</h1>
  <span class="statut">{{ messageStatut }}</span>
</header>

<main class="layout">
  <!-- Composant enfant : Formulaire (@Output → ajouterContact) -->
  <section class="panel">
    <app-formulaire-contact
      (contactSauvegarde)="ajouterContact($event)">
    </app-formulaire-contact>
  </section>

  <!-- Composant enfant : Liste (@Input contacts, @Output → supprimerContact) -->
  <section class="panel">
    <app-liste-contacts
      [contacts]="mesContacts"
      (contactSupprime)="supprimerContact($event)">
    </app-liste-contacts>
  </section>
</main>
